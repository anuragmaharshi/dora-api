openapi: "3.0.3"
info:
  title: DORA API
  version: "0.0.1"
  description: Incident management API for DORA compliance reporting.
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      tags:
        - health
      security: []
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          description: Unexpected server error

  /api/v1/auth/login:
    post:
      summary: Authenticate and receive a signed JWT
      operationId: login
      tags:
        - auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful — JWT returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/me:
    get:
      summary: Get authenticated user's profile
      operationId: getMe
      tags:
        - auth
      responses:
        "200":
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/logout:
    post:
      summary: Stateless logout — client must discard the token
      operationId: logout
      tags:
        - auth
      responses:
        "204":
          description: Logout acknowledged — no content
        "401":
          description: Missing or invalid bearer token

  /api/v1/auth/refresh:
    post:
      summary: Issue a new JWT using the current valid token (stateless re-issue)
      operationId: refreshToken
      tags:
        - auth
      responses:
        "200":
          description: New JWT issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Missing or invalid bearer token

  /api/v1/audit:
    get:
      summary: "FR-029: List audit history for an entity (read-only, bank roles only)"
      description: |
        Returns the append-only audit trail for a specific entity, newest row first.
        PLATFORM_ADMIN is explicitly excluded (BR-011, NFR-009).
        Permitted roles: OPS_ANALYST, INCIDENT_MANAGER, COMPLIANCE_OFFICER, CISO, BOARD_VIEWER.
      operationId: getAuditHistory
      tags:
        - audit
      parameters:
        - name: entity
          in: query
          required: true
          description: Entity type discriminator (e.g. INCIDENT, CLASSIFICATION, NCA_REPORT)
          schema:
            type: string
            example: INCIDENT
        - name: id
          in: query
          required: true
          description: UUID of the entity whose audit history is requested
          schema:
            type: string
            format: uuid
            example: "00000000-0000-0000-0000-000000000099"
        - name: page
          in: query
          required: false
          description: 0-based page index
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          description: Number of rows per page
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated audit history, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEntryPage"
        "400":
          description: Missing or invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller does not have a permitted bank role (e.g. PLATFORM_ADMIN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/incidents/_probe:
    get:
      summary: RBAC probe — accessible to bank roles only (PLATFORM_ADMIN blocked)
      operationId: incidentProbe
      tags:
        - incidents
      responses:
        "200":
          description: Caller has a permitted bank role
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        "401":
          description: Not authenticated
        "403":
          description: Authenticated but role not permitted (e.g. PLATFORM_ADMIN)

  # ── LLD-04: Admin endpoints (PLATFORM_ADMIN only) ──────────────────────────

  /api/v1/admin/tenant:
    get:
      summary: Get the tenant's current configuration
      operationId: getAdminTenant
      tags:
        - admin
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tenant configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantConfigDTO"
        "401":
          description: Not authenticated
        "403":
          description: Not PLATFORM_ADMIN
    put:
      summary: Update the tenant's configuration
      operationId: updateAdminTenant
      tags:
        - admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantConfigUpdateDTO"
      responses:
        "200":
          description: Updated tenant configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantConfigDTO"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "403":
          description: Not PLATFORM_ADMIN

  /api/v1/admin/critical-services:
    get:
      summary: List all critical services (including archived)
      operationId: listCriticalServices
      tags:
        - admin
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of critical services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CriticalServiceDTO"
        "401":
          description: Not authenticated
        "403":
          description: Not PLATFORM_ADMIN
    post:
      summary: Create a new critical service
      operationId: createCriticalService
      tags:
        - admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCriticalServiceDTO"
      responses:
        "201":
          description: Critical service created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CriticalServiceDTO"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "403":
          description: Not PLATFORM_ADMIN
        "409":
          description: Service name already exists for this tenant

  /api/v1/admin/critical-services/{id}:
    put:
      summary: Update a critical service
      operationId: updateCriticalService
      tags:
        - admin
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCriticalServiceDTO"
      responses:
        "200":
          description: Updated critical service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CriticalServiceDTO"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "403":
          description: Not PLATFORM_ADMIN
        "404":
          description: Service not found
        "409":
          description: Service name already exists

  /api/v1/admin/critical-services/{id}/archive:
    post:
      summary: Archive a critical service (sets active=false)
      operationId: archiveCriticalService
      tags:
        - admin
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Service archived
        "401":
          description: Not authenticated
        "403":
          description: Not PLATFORM_ADMIN
        "404":
          description: Service not found

  /api/v1/admin/client-base:
    get:
      summary: Get client base history (most recent first)
      operationId: getClientBaseHistory
      tags:
        - admin
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Client base history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientBaseHistoryDTO"
        "401":
          description: Not authenticated
        "403":
          description: Not PLATFORM_ADMIN
    post:
      summary: Append a new client base count entry
      operationId: addClientBaseEntry
      tags:
        - admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetClientBaseDTO"
      responses:
        "201":
          description: Client base entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientBaseEntryDTO"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "403":
          description: Not PLATFORM_ADMIN

  /api/v1/admin/nca-email:
    get:
      summary: Get NCA email configuration
      operationId: getNcaEmailConfig
      tags:
        - admin
      security:
        - bearerAuth: []
      responses:
        "200":
          description: NCA email configuration (empty if not yet configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NcaEmailConfigDTO"
        "401":
          description: Not authenticated
        "403":
          description: Not PLATFORM_ADMIN
    put:
      summary: Create or update NCA email configuration
      operationId: updateNcaEmailConfig
      tags:
        - admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NcaEmailConfigUpdateDTO"
      responses:
        "200":
          description: Updated NCA email configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NcaEmailConfigDTO"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "403":
          description: Not PLATFORM_ADMIN

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
        - timestamp
      properties:
        status:
          type: string
          example: healthy
        version:
          type: string
          example: "0.0.1"
        timestamp:
          type: string
          format: date-time
          example: "2026-04-24T10:00:00Z"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: ops@dora.local
        password:
          type: string
          format: password
          example: ChangeMe!23

    LoginResponse:
      type: object
      required:
        - token
        - expiresAt
        - user
      properties:
        token:
          type: string
          description: Signed HMAC-SHA256 JWT
          example: eyJhbGciOiJIUzI1NiJ9...
        expiresAt:
          type: string
          format: date-time
          example: "2026-04-24T11:00:00Z"
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      required:
        - email
        - roles
        - tenantId
        - mfaEnabled
      properties:
        email:
          type: string
          format: email
          example: ops@dora.local
        roles:
          type: array
          items:
            type: string
          example: ["OPS_ANALYST"]
        tenantId:
          type: string
          format: uuid
          example: "00000000-0000-0000-0000-000000000001"
        mfaEnabled:
          type: boolean
          example: false

    AuditEntry:
      type: object
      description: Single row from the append-only audit_log table (LLD-03 §5)
      properties:
        id:
          type: string
          format: uuid
          example: "aaaaaaaa-0000-0000-0000-000000000001"
        tenantId:
          type: string
          format: uuid
          example: "00000000-0000-0000-0000-000000000001"
        actorId:
          type: string
          format: uuid
          nullable: true
          description: NULL for SYSTEM actions
          example: "00000000-0000-0000-0001-000000000002"
        actorUsername:
          type: string
          example: ops@dora.local
        action:
          type: string
          example: INCIDENT_CREATED
        entityType:
          type: string
          example: INCIDENT
        entityId:
          type: string
          format: uuid
          nullable: true
          description: NULL for non-entity events
          example: "00000000-0000-0000-0000-000000000099"
        beforeState:
          type: object
          nullable: true
          description: JSON snapshot of the entity before the change; null on creation events
        afterState:
          type: object
          nullable: true
          description: JSON snapshot of the entity after the change; null on deletion events
        context:
          type: object
          nullable: true
          description: "Forensic context: request_id, remote_ip, user_agent only (Q-2 ruling)"
          properties:
            request_id:
              type: string
              nullable: true
            remote_ip:
              type: string
              nullable: true
            user_agent:
              type: string
              nullable: true
        createdAt:
          type: string
          format: date-time
          example: "2026-04-25T10:00:00Z"

    AuditEntryPage:
      type: object
      description: Spring Page wrapper for AuditEntry (pagination metadata + content array)
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer
        first:
          type: boolean
        last:
          type: boolean

    ErrorResponse:
      type: object
      required:
        - message
        - timestamp
      properties:
        message:
          type: string
          example: Invalid credentials
        timestamp:
          type: string
          format: date-time
          example: "2026-04-24T10:00:00Z"

    # ── LLD-04: Admin schemas ──────────────────────────────────────────────────

    TenantConfigDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        legalName:
          type: string
        lei:
          type: string
        ncaName:
          type: string
        ncaEmail:
          type: string
        jurisdictionIso:
          type: string
          maxLength: 2
        primaryComplianceContactId:
          type: string
          format: uuid

    TenantConfigUpdateDTO:
      type: object
      required:
        - legalName
      properties:
        legalName:
          type: string
        lei:
          type: string
          pattern: "^[A-Z0-9]{20}$"
        ncaName:
          type: string
        ncaEmail:
          type: string
          format: email
        jurisdictionIso:
          type: string
          minLength: 2
          maxLength: 2
        primaryComplianceContactId:
          type: string
          format: uuid

    CriticalServiceDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateCriticalServiceDTO:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string

    UpdateCriticalServiceDTO:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string

    ClientBaseHistoryDTO:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ClientBaseEntryDTO"

    ClientBaseEntryDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        clientCount:
          type: integer
          format: int64
        effectiveFrom:
          type: string
          format: date-time
        setBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    SetClientBaseDTO:
      type: object
      required:
        - clientCount
        - effectiveFrom
      properties:
        clientCount:
          type: integer
          format: int64
          minimum: 0
        effectiveFrom:
          type: string
          format: date-time

    NcaEmailConfigDTO:
      type: object
      properties:
        sender:
          type: string
        recipient:
          type: string
        subjectTemplate:
          type: string

    NcaEmailConfigUpdateDTO:
      type: object
      required:
        - sender
        - recipient
        - subjectTemplate
      properties:
        sender:
          type: string
          format: email
        recipient:
          type: string
          format: email
        subjectTemplate:
          type: string
          maxLength: 500
